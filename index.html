<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Safarnama — Travel Album</title>
<meta name="theme-color" content="#1F6E6B">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Safarnama">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --paper:#F4F2EC; --card:#FDFBF6; --ink:#22343A; --ink2:#5B6E70;
  --teal:#1F6E6B; --teal-soft:#E3EEED; --gold:#E8A13D; --gold-soft:#FBF0DC;
  --rose:#B5483A; --line:#E2DDD1;
  --serif:Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.45;
  overscroll-behavior-y:contain;-webkit-font-smoothing:antialiased}
button{font-family:inherit;font-size:inherit;border:none;background:none;color:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);background:#fff;
  border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--ink2);letter-spacing:.04em;
  text-transform:uppercase;margin:14px 0 5px}
::placeholder{color:#A9B4B2}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;
  padding:calc(var(--sat) + 12px) 16px 12px;display:flex;align-items:center;gap:10px}
.topbar h1{font-family:var(--serif);font-style:italic;font-weight:400;font-size:22px;letter-spacing:.01em}
.topbar .sub{font-size:11px;opacity:.75;letter-spacing:.14em;text-transform:uppercase;font-family:var(--mono)}
.topbar .spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:rgba(255,255,255,.14)}
.iconbtn:active{background:rgba(255,255,255,.3)}
.backbtn{margin-left:-6px}

/* ---------- home ---------- */
main{padding:16px 16px calc(90px + var(--sab));max-width:640px;margin:0 auto}
.stats{display:flex;gap:8px;margin-bottom:18px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;text-align:center}
.stat b{display:block;font-family:var(--mono);font-size:17px;color:var(--teal)}
.stat span{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}

/* boarding-pass trip card */
.pass{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;
  overflow:hidden;box-shadow:0 1px 3px rgba(34,52,58,.07);position:relative}
.pass:active{transform:scale(.985)}
.pass .cover{height:130px;background:var(--teal-soft);position:relative;overflow:hidden}
.pass .cover img{width:100%;height:100%;object-fit:cover;display:block}
.pass .cover .noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:40px;opacity:.45}
.pass .code{position:absolute;top:10px;left:12px;background:rgba(34,52,58,.82);color:#fff;
  font-family:var(--mono);font-size:13px;letter-spacing:.22em;padding:4px 9px 4px 11px;border-radius:6px}
.pass .body{padding:12px 14px 13px}
.pass .dest{font-family:var(--serif);font-style:italic;font-size:21px;line-height:1.15}
.pass .region{font-size:12.5px;color:var(--ink2);margin-top:1px}
.pass .perf{border-top:2px dashed var(--line);margin:11px -14px 9px;position:relative}
.pass .perf::before,.pass .perf::after{content:'';position:absolute;top:-8px;width:16px;height:16px;
  border-radius:50%;background:var(--paper);border:1px solid var(--line)}
.pass .perf::before{left:-9px}.pass .perf::after{right:-9px}
.pass .row{display:flex;align-items:baseline;gap:10px;font-size:12.5px;color:var(--ink2)}
.pass .row .mono{font-family:var(--mono);color:var(--ink);font-size:12px;letter-spacing:.03em}
.pass .row .amt{margin-left:auto;font-family:var(--mono);font-size:15px;font-weight:700;color:var(--teal)}

.empty{text-align:center;padding:56px 24px;color:var(--ink2)}
.empty .big{font-size:52px;margin-bottom:12px}
.empty h2{font-family:var(--serif);font-style:italic;font-weight:400;font-size:21px;color:var(--ink);margin-bottom:6px}
.empty p{font-size:14px;max-width:280px;margin:0 auto}

/* floating action button */
.fab{position:fixed;right:18px;bottom:calc(20px + var(--sab));z-index:15;background:var(--gold);color:#3A2A10;
  border-radius:30px;padding:14px 20px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 14px rgba(232,161,61,.45)}
.fab:active{transform:scale(.96)}

/* ---------- trip detail ---------- */
.triphead{background:var(--teal);color:#fff;padding:4px 16px 18px;margin:-16px -16px 14px;border-radius:0 0 20px 20px}
.triphead .dest{font-family:var(--serif);font-style:italic;font-size:26px}
.triphead .meta{font-size:13px;opacity:.85;margin-top:2px}
.triphead .totalline{display:flex;align-items:baseline;gap:8px;margin-top:12px}
.triphead .totalline b{font-family:var(--mono);font-size:24px}
.triphead .totalline span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.75}
.catbars{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.catbar{display:grid;grid-template-columns:88px 1fr 74px;align-items:center;gap:8px;font-size:11.5px}
.catbar .track{height:7px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden}
.catbar .fill{height:100%;background:var(--gold);border-radius:4px}
.catbar .val{font-family:var(--mono);text-align:right;opacity:.9;font-size:11px}

.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--card);border:1.5px solid var(--line);border-radius:20px;
  padding:7px 14px;font-size:13.5px;font-weight:600;color:var(--ink2);white-space:nowrap}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* entry cards */
.entry{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 13px;
  margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.entry:active{background:#F7F3E9}
.entry .thumb{flex:0 0 58px;width:58px;height:58px;border-radius:8px;overflow:hidden;background:var(--teal-soft);
  display:flex;align-items:center;justify-content:center;font-size:24px}
.entry .thumb img{width:100%;height:100%;object-fit:cover}
.entry .info{flex:1;min-width:0}
.entry .name{font-weight:650;font-size:15.5px;line-height:1.25}
.entry .sub{font-size:12.5px;color:var(--ink2);margin-top:2px}
.entry .badges{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:2.5px 8px;border-radius:5px;
  background:var(--teal-soft);color:var(--teal)}
.badge.gold{background:var(--gold-soft);color:#9A6412}
.entry .amt{font-family:var(--mono);font-weight:700;font-size:14.5px;color:var(--teal);white-space:nowrap}
.datehdr{font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);
  margin:16px 2px 8px;font-family:var(--mono)}

/* memories grid — postage-stamp frames */
.memgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
.stamp{aspect-ratio:1;background:#fff;padding:7px;position:relative;
  box-shadow:0 1px 4px rgba(34,52,58,.14);
  -webkit-mask:linear-gradient(#000 0 0) content-box,
    radial-gradient(circle 3.5px,#0000 97%,#000 0) 0 0/14px 14px round;
  -webkit-mask-composite:source-over;
  mask:linear-gradient(#000 0 0) content-box,
    radial-gradient(circle 3.5px,#0000 97%,#000 0) 0 0/14px 14px round;
  mask-composite:add}
.stamp img{width:100%;height:100%;object-fit:cover;display:block}

/* ---------- modal sheets ---------- */
.overlay{position:fixed;inset:0;background:rgba(24,36,40,.5);z-index:40;display:flex;
  align-items:flex-end;justify-content:center;animation:fade .18s}
@keyframes fade{from{opacity:0}}
.sheet{background:var(--paper);width:100%;max-width:640px;max-height:92vh;max-height:92dvh;border-radius:18px 18px 0 0;
  display:flex;flex-direction:column;animation:up .22s ease-out}
@keyframes up{from{transform:translateY(40px);opacity:.5}}
.sheet .shead{display:flex;align-items:center;padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.sheet .shead h2{font-family:var(--serif);font-style:italic;font-weight:400;font-size:19px;flex:1}
.sheet .sbody{overflow-y:auto;padding:4px 16px 16px;-webkit-overflow-scrolling:touch}
.sheet .sfoot{padding:12px 16px calc(12px + var(--sab));border-top:1px solid var(--line);display:flex;gap:10px}
.btn{flex:1;border-radius:12px;padding:14px;font-weight:700;font-size:15.5px;text-align:center}
.btn.primary{background:var(--teal);color:#fff}
.btn.ghost{background:var(--card);border:1.5px solid var(--line);color:var(--ink2)}
.btn.danger{background:var(--rose);color:#fff}
.btn:active{opacity:.85}
.btn:disabled{opacity:.45}
.row2{display:flex;gap:10px}.row2>div{flex:1}
.catpick{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:4px}
.catpick button{border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:9px 2px 7px;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--ink2)}
.catpick button .ic{font-size:21px}
.catpick button.on{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}
.seg{display:flex;background:#fff;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{flex:1;padding:10px;font-size:13.5px;font-weight:650;color:var(--ink2)}
.seg button.on{background:var(--teal);color:#fff}
.photoadd{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
.photoadd .pthumb{width:70px;height:70px;border-radius:9px;overflow:hidden;position:relative;background:var(--teal-soft)}
.photoadd .pthumb img{width:100%;height:100%;object-fit:cover}
.photoadd .pthumb .x{position:absolute;top:2px;right:2px;width:21px;height:21px;border-radius:50%;
  background:rgba(24,36,40,.75);color:#fff;font-size:12px;line-height:21px;text-align:center}
.photoadd .addph{width:70px;height:70px;border:2px dashed var(--line);border-radius:9px;color:var(--ink2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;gap:1px}
.photoadd .addph span{font-size:20px;line-height:1}
.note{font-size:12px;color:var(--ink2);margin-top:6px}

/* confirm dialog */
.confirmbox{background:var(--card);margin:auto;border-radius:16px;padding:22px 20px 16px;width:calc(100% - 56px);max-width:340px;animation:up .18s}
.confirmbox h3{font-size:16.5px;margin-bottom:6px}
.confirmbox p{font-size:14px;color:var(--ink2);margin-bottom:16px}
.confirmbox .actions{display:flex;gap:9px}

/* photo viewer */
.viewer{position:fixed;inset:0;background:#0F1719;z-index:60;display:flex;flex-direction:column;animation:fade .15s}
.viewer .vimg{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:10px}
.viewer img{max-width:100%;max-height:100%;object-fit:contain}
.viewer .vbar{display:flex;gap:10px;padding:12px 16px calc(14px + var(--sab));justify-content:center}
.viewer .vbar button{color:#fff;background:rgba(255,255,255,.13);border-radius:10px;padding:11px 16px;font-size:13.5px;font-weight:650}
.viewer .vclose{position:absolute;top:calc(var(--sat) + 12px);right:14px;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.15);color:#fff;font-size:18px}

.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--sab));z-index:70;
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:22px;font-size:13.5px;font-weight:600;
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.hidden{display:none!important}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modals"></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" multiple class="hidden">
<input type="file" id="importInput" accept=".json,application/json" class="hidden">

<script>
'use strict';
/* ============ constants ============ */
const CATS = {
  place:  {ic:'📍', label:'Places',       one:'Place visited'},
  stay:   {ic:'🏨', label:'Stays',        one:'Hotel / stay'},
  food:   {ic:'🍽️', label:'Food & Cafés', one:'Restaurant / café'},
  shop:   {ic:'🛍️', label:'Shopping',     one:'Shopping'},
  gift:   {ic:'🎁', label:'Gifts',        one:'Gift'},
  fun:    {ic:'🎭', label:'Entertainment',one:'Entertainment'},
  travel: {ic:'🚌', label:'Travel',       one:'Travel / fare'},
  people: {ic:'🤝', label:'People',       one:'Person met'},
  misc:   {ic:'🧾', label:'Others',       one:'Other / miscellaneous'}
};
const MODES = ['Flight','Train','Bus','Taxi / Cab','Auto-rickshaw','Metro','Ferry / Boat','Self-drive / Rental','Two-wheeler','Walk','Other'];
const fmtN = new Intl.NumberFormat('en-IN',{maximumFractionDigits:0});
const inr = v => '₹' + fmtN.format(Math.round(+v||0));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const esc = s => (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtD = iso => { if(!iso) return ''; const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); };
const fmtDshort = iso => { if(!iso) return ''; const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}).toUpperCase(); };
const destCode = s => (s||'TRP').replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase().padEnd(3,'X');

/* ============ IndexedDB ============ */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const rq = indexedDB.open('safarnama', 1);
    rq.onupgradeneeded = e => {
      const d = e.target.result;
      d.createObjectStore('trips',{keyPath:'id'});
      d.createObjectStore('entries',{keyPath:'id'}).createIndex('tripId','tripId');
      d.createObjectStore('photos',{keyPath:'id'}).createIndex('tripId','tripId');
    };
    rq.onsuccess = () => { db = rq.result; res(); };
    rq.onerror = () => rej(rq.error);
  });
}
const tx = (store,mode)=>db.transaction(store,mode).objectStore(store);
const put = (s,v)=>new Promise((r,j)=>{const q=tx(s,'readwrite').put(v);q.onsuccess=()=>r(v);q.onerror=()=>j(q.error);});
const del = (s,k)=>new Promise((r,j)=>{const q=tx(s,'readwrite').delete(k);q.onsuccess=r;q.onerror=()=>j(q.error);});
const get = (s,k)=>new Promise((r,j)=>{const q=tx(s,'readonly').get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const all = s=>new Promise((r,j)=>{const q=tx(s,'readonly').getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const byTrip = (s,tid)=>new Promise((r,j)=>{const q=tx(s,'readonly').index('tripId').getAll(tid);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});

/* photo blob URLs cache */
const urlCache = new Map();
async function photoURL(id){
  if(!id) return null;
  if(urlCache.has(id)) return urlCache.get(id);
  const p = await get('photos', id);
  if(!p) return null;
  const u = URL.createObjectURL(p.blob);
  urlCache.set(id, u);
  return u;
}

/* compress an image file -> JPEG blob */
function compressImage(file, maxDim=1400, q=0.72){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = () => {
      let {width:w, height:h} = img;
      if(Math.max(w,h) > maxDim){ const k = maxDim/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b => b ? res(b) : rej(new Error('encode failed')), 'image/jpeg', q);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => rej(new Error('read failed'));
    img.src = URL.createObjectURL(file);
  });
}

/* ============ navigation (Android back-safe) ============ */
let view = {name:'home'};
const modalStack = [];
function navigate(v){ view = v; history.pushState({nav:v}, ''); render(); }
window.addEventListener('popstate', e => {
  if(modalStack.length){ const top = modalStack.pop(); top.el.remove(); if(top.onClose) top.onClose(); return; }
  view = (e.state && e.state.nav) ? e.state.nav : {name:'home'};
  render();
});
function openModal(el, onClose){
  document.getElementById('modals').appendChild(el);
  modalStack.push({el, onClose});
  history.pushState({modal:true}, '');
}
function closeModal(){ if(modalStack.length) history.back(); }

/* ============ toast & confirm ============ */
let toastT;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2200);
}
function confirmBox(title, msg, okLabel, danger=true){
  return new Promise(res=>{
    const ov = document.createElement('div');
    ov.className = 'overlay'; ov.style.alignItems = 'center';
    ov.innerHTML = `<div class="confirmbox"><h3>${esc(title)}</h3><p>${esc(msg)}</p>
      <div class="actions"><button class="btn ghost" data-a="no">Cancel</button>
      <button class="btn ${danger?'danger':'primary'}" data-a="yes">${esc(okLabel)}</button></div></div>`;
    let ans = false;
    ov.addEventListener('click', e=>{
      const a = e.target.dataset.a;
      if(a){ ans = a==='yes'; closeModal(); }
      else if(e.target===ov) closeModal();
    });
    openModal(ov, ()=>res(ans));
  });
}

/* ============ RENDER: HOME ============ */
async function render(){
  const app = document.getElementById('app');
  if(view.name === 'home') await renderHome(app);
  else if(view.name === 'trip') await renderTrip(app, view.id, view.tab||'all');
}

async function renderHome(app){
  const [trips, entries, photos] = await Promise.all([all('trips'), all('entries'), all('photos')]);
  trips.sort((a,b)=>(b.start||'').localeCompare(a.start||''));
  const spendByTrip = {};
  entries.forEach(e=>{ spendByTrip[e.tripId] = (spendByTrip[e.tripId]||0) + (+e.amount||0); });
  const totalSpend = Object.values(spendByTrip).reduce((a,b)=>a+b,0);

  let cards = '';
  for(const t of trips){
    const coverU = await photoURL(t.cover);
    const people = (t.travelers||'').split(',').map(s=>s.trim()).filter(Boolean);
    cards += `
    <div class="pass" data-trip="${t.id}">
      <div class="cover">${coverU ? `<img src="${coverU}" alt="">` : `<div class="noimg">🏔️</div>`}
        <div class="code">${destCode(t.dest)}</div></div>
      <div class="body">
        <div class="dest">${esc(t.dest)}</div>
        ${t.region ? `<div class="region">${esc(t.region)}</div>` : ''}
        <div class="perf"></div>
        <div class="row">
          <span class="mono">${fmtDshort(t.start)}${t.end ? ' → ' + fmtDshort(t.end) : ''}</span>
          ${people.length ? `<span>· ${people.length} traveller${people.length>1?'s':''}</span>` : ''}
          <span class="amt">${inr(spendByTrip[t.id]||0)}</span>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML = `
  <div class="topbar">
    <div><h1>Safarnama</h1><div class="sub">Travel Album · Offline</div></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="backupBtn" title="Backup">⇅</button>
  </div>
  <main>
    ${trips.length ? `
    <div class="stats">
      <div class="stat"><b>${trips.length}</b><span>Trips</span></div>
      <div class="stat"><b>${inr(totalSpend)}</b><span>Total spent</span></div>
      <div class="stat"><b>${photos.length}</b><span>Memories</span></div>
    </div>${cards}` : `
    <div class="empty"><div class="big">🧳</div>
      <h2>Your album is empty</h2>
      <p>Add your first trip — destination, dates and companions — then log places, stays, food, shopping, fares and people you meet as you go.</p>
    </div>`}
  </main>
  <button class="fab" id="addTrip">＋ New trip</button>`;

  app.querySelectorAll('.pass').forEach(el=>el.addEventListener('click', ()=>navigate({name:'trip', id:el.dataset.trip})));
  app.querySelector('#addTrip').addEventListener('click', ()=>tripForm(null));
  app.querySelector('#backupBtn').addEventListener('click', backupSheet);
}

/* ============ RENDER: TRIP DETAIL ============ */
async function renderTrip(app, id, tab){
  const t = await get('trips', id);
  if(!t){ view={name:'home'}; return render(); }
  const entries = await byTrip('entries', id);
  entries.sort((a,b)=>(b.date||'').localeCompare(a.date||'') || (b.created||0)-(a.created||0));
  const total = entries.reduce((s,e)=>s+(+e.amount||0),0);
  const catTot = {}; Object.keys(CATS).forEach(c=>catTot[c]=0);
  entries.forEach(e=>{ if(catTot[e.cat]!=null) catTot[e.cat]+=(+e.amount||0); });
  const maxCat = Math.max(1, ...Object.values(catTot));

  const bars = Object.keys(CATS).filter(c=>catTot[c]>0).map(c=>`
    <div class="catbar"><span>${CATS[c].ic} ${CATS[c].label}</span>
    <div class="track"><div class="fill" style="width:${Math.round(catTot[c]/maxCat*100)}%"></div></div>
    <span class="val">${inr(catTot[c])}</span></div>`).join('');

  const chips = ['all',...Object.keys(CATS),'memories'].map(c=>{
    const lb = c==='all' ? 'All' : c==='memories' ? '🖼️ Memories' : CATS[c].ic+' '+CATS[c].label;
    return `<button class="chip ${tab===c?'on':''}" data-tab="${c}">${lb}</button>`;
  }).join('');

  let listHTML = '';
  if(tab === 'memories'){
    const photos = await byTrip('photos', id);
    photos.sort((a,b)=>(b.created||0)-(a.created||0));
    if(!photos.length){
      listHTML = `<div class="empty"><div class="big">📷</div><h2>No memories yet</h2>
        <p>Photos you attach to places, meals and finds will appear here as your trip's album.</p></div>`;
    } else {
      let cells = '';
      for(const p of photos) cells += `<button class="stamp" data-ph="${p.id}"><img src="${await photoURL(p.id)}" alt=""></button>`;
      listHTML = `<div class="memgrid">${cells}</div>`;
    }
  } else {
    const shown = entries.filter(e=>tab==='all' || e.cat===tab);
    if(!shown.length){
      listHTML = `<div class="empty"><div class="big">${tab==='all'?'📓':CATS[tab].ic}</div>
        <h2>Nothing logged yet</h2><p>Tap “Add memory” to record ${tab==='all'?'a place, meal, purchase or journey':CATS[tab].one.toLowerCase()} with its cost and photos.</p></div>`;
    } else {
      let lastDate = null;
      for(const e of shown){
        if(e.date !== lastDate){ listHTML += `<div class="datehdr">${fmtD(e.date)||'Undated'}</div>`; lastDate = e.date; }
        const thumbU = e.photos && e.photos.length ? await photoURL(e.photos[0]) : null;
        const badges = [`<span class="badge">${CATS[e.cat].ic} ${CATS[e.cat].label}</span>`];
        if(e.cat==='travel'){
          if(e.mode) badges.push(`<span class="badge gold">${esc(e.mode)}</span>`);
          badges.push(`<span class="badge gold">${e.scope==='local'?'Local':'Getting there'}</span>`);
        }
        if(e.cat==='stay' && e.date && e.checkout){
          const n = Math.max(1, Math.round((new Date(e.checkout) - new Date(e.date)) / 86400000));
          badges.push(`<span class="badge gold">${n} night${n>1?'s':''}</span>`);
        }
        if(e.cat==='people' && e.contact) badges.push(`<span class="badge gold">📞 ${esc(e.contact)}</span>`);
        if(e.photos && e.photos.length>1) badges.push(`<span class="badge">📷 ${e.photos.length}</span>`);
        listHTML += `
        <div class="entry" data-entry="${e.id}">
          <div class="thumb">${thumbU?`<img src="${thumbU}" alt="">`:CATS[e.cat].ic}</div>
          <div class="info">
            <div class="name">${esc(e.name)}</div>
            ${e.notes?`<div class="sub">${esc(e.notes)}</div>`:''}
            <div class="badges">${badges.join('')}</div>
          </div>
          <div class="amt">${(+e.amount||0)?inr(e.amount):''}</div>
        </div>`;
      }
    }
  }

  const people = (t.travelers||'').split(',').map(s=>s.trim()).filter(Boolean);
  app.innerHTML = `
  <div class="topbar">
    <button class="iconbtn backbtn" id="back">←</button>
    <div><h1>${esc(t.dest)}</h1><div class="sub">${destCode(t.dest)} · Trip log</div></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="editTrip" title="Edit trip">✎</button>
  </div>
  <main>
    <div class="triphead">
      <div class="dest">${esc(t.dest)}${t.region?`, <span style="font-size:.72em">${esc(t.region)}</span>`:''}</div>
      <div class="meta">${fmtD(t.start)}${t.end?' → '+fmtD(t.end):''}${people.length?' · with '+esc(people.join(', ')):''}</div>
      <div class="totalline"><b>${inr(total)}</b><span>total spend</span></div>
      ${bars?`<div class="catbars">${bars}</div>`:''}
    </div>
    <div class="chips">${chips}</div>
    ${listHTML}
  </main>
  <button class="fab" id="addEntry">＋ Add memory</button>`;

  app.querySelector('#back').addEventListener('click', ()=>history.back());
  app.querySelector('#editTrip').addEventListener('click', ()=>tripForm(t));
  app.querySelectorAll('.chip').forEach(c=>c.addEventListener('click', ()=>{
    view = {name:'trip', id, tab:c.dataset.tab}; history.replaceState({nav:view},''); render();
  }));
  app.querySelectorAll('.entry').forEach(el=>el.addEventListener('click', async ()=>{
    entryForm(t, await get('entries', el.dataset.entry));
  }));
  app.querySelectorAll('.stamp').forEach(el=>el.addEventListener('click', ()=>photoViewer(el.dataset.ph, t)));
  app.querySelector('#addEntry').addEventListener('click', ()=>entryForm(t, null, tab in CATS ? tab : 'place'));
}

/* ============ TRIP FORM ============ */
function tripForm(existing){
  const t = existing || {id:uid(), dest:'', region:'', start:'', end:'', travelers:'', notes:'', cover:null, created:Date.now()};
  const isNew = !existing;
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
  <div class="sheet">
    <div class="shead"><h2>${isNew?'New trip':'Edit trip'}</h2>
      <button class="iconbtn" style="background:var(--teal-soft);color:var(--teal)" data-x>✕</button></div>
    <div class="sbody">
      <label>Destination *</label><input id="f_dest" placeholder="e.g. Udaipur" value="${esc(t.dest)}">
      <label>State / Country</label><input id="f_region" placeholder="e.g. Rajasthan, India" value="${esc(t.region)}">
      <div class="row2">
        <div><label>From *</label><input type="date" id="f_start" value="${t.start||''}"></div>
        <div><label>To</label><input type="date" id="f_end" value="${t.end||''}"></div>
      </div>
      <label>Travellers</label><input id="f_trav" placeholder="Names, comma-separated" value="${esc(t.travelers)}">
      <label>Notes</label><textarea id="f_notes" rows="2" placeholder="Anything to remember about this trip">${esc(t.notes)}</textarea>
      ${isNew?'':`<label>Danger zone</label>
        <button class="btn danger" id="delTrip" style="width:100%">Delete trip &amp; all its records</button>`}
    </div>
    <div class="sfoot">
      <button class="btn ghost" data-x>Cancel</button>
      <button class="btn primary" id="saveTrip">${isNew?'Create trip':'Save changes'}</button>
    </div>
  </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov || e.target.closest('[data-x]')) closeModal(); });
  ov.querySelector('#saveTrip').addEventListener('click', async ()=>{
    const dest = ov.querySelector('#f_dest').value.trim();
    const start = ov.querySelector('#f_start').value;
    if(!dest){ toast('Destination is required'); return; }
    if(!start){ toast('Start date is required'); return; }
    Object.assign(t, { dest, start,
      region: ov.querySelector('#f_region').value.trim(),
      end: ov.querySelector('#f_end').value,
      travelers: ov.querySelector('#f_trav').value.trim(),
      notes: ov.querySelector('#f_notes').value.trim() });
    await put('trips', t);
    closeModal();
    toast(isNew ? 'Trip created' : 'Trip saved');
    if(isNew){ setTimeout(()=>navigate({name:'trip', id:t.id}), 60); } else render();
  });
  const delBtn = ov.querySelector('#delTrip');
  if(delBtn) delBtn.addEventListener('click', async ()=>{
    const ok = await confirmBox('Delete this trip?', 'Every place, expense and photo in it will be removed. This cannot be undone.', 'Delete trip');
    if(!ok) return;
    const [es, ps] = await Promise.all([byTrip('entries',t.id), byTrip('photos',t.id)]);
    for(const e of es) await del('entries', e.id);
    for(const p of ps){ await del('photos', p.id); urlCache.delete(p.id); }
    await del('trips', t.id);
    closeModal();
    toast('Trip deleted');
    setTimeout(()=>{ view={name:'home'}; history.replaceState({nav:view},''); render(); }, 60);
  });
  openModal(ov);
}

/* ============ ENTRY FORM ============ */
function entryForm(trip, existing, presetCat){
  const e = existing || {id:uid(), tripId:trip.id, cat:presetCat||'place', name:'', date:trip.start||'',
    amount:'', notes:'', mode:'', scope:'local', checkout:'', contact:'', photos:[], created:Date.now()};
  const isNew = !existing;
  const newPhotoIds = [];           // photos added in this session (rolled back on cancel)
  let photos = [...(e.photos||[])];

  const ov = document.createElement('div');
  ov.className = 'overlay';
  const catBtns = Object.keys(CATS).map(c=>
    `<button data-cat="${c}" class="${e.cat===c?'on':''}"><span class="ic">${CATS[c].ic}</span>${CATS[c].label}</button>`).join('');
  const modeOpts = MODES.map(m=>`<option ${e.mode===m?'selected':''}>${m}</option>`).join('');

  ov.innerHTML = `
  <div class="sheet">
    <div class="shead"><h2>${isNew?'Add memory':'Edit memory'}</h2>
      <button class="iconbtn" style="background:var(--teal-soft);color:var(--teal)" data-x>✕</button></div>
    <div class="sbody">
      <label>Category</label>
      <div class="catpick">${catBtns}</div>
      <label id="l_name">Name *</label><input id="e_name" placeholder="" value="${esc(e.name)}">
      <div id="travelExtra" class="${e.cat==='travel'?'':'hidden'}">
        <label>Mode of travel</label>
        <select id="e_mode"><option value="">— select —</option>${modeOpts}</select>
        <label>Journey type</label>
        <div class="seg" id="scopeSeg">
          <button data-s="intercity" class="${e.scope==='intercity'?'on':''}">Getting there</button>
          <button data-s="local" class="${e.scope!=='intercity'?'on':''}">Local (at destination)</button>
        </div>
      </div>
      <div id="stayExtra" class="${e.cat==='stay'?'':'hidden'}">
        <label>Check-out</label><input type="date" id="e_checkout" value="${e.checkout||''}">
      </div>
      <div id="peopleExtra" class="${e.cat==='people'?'':'hidden'}">
        <label>Phone / contact</label><input id="e_contact" inputmode="tel" placeholder="Mobile, email or Instagram" value="${esc(e.contact||'')}">
      </div>
      <div class="row2">
        <div><label id="l_date">Date</label><input type="date" id="e_date" value="${e.date||''}"></div>
        <div><label>Amount (₹)</label><input type="number" inputmode="decimal" min="0" id="e_amt" placeholder="0" value="${e.amount!==''&&e.amount!=null?e.amount:''}"></div>
      </div>
      <label>Notes</label><textarea id="e_notes" rows="2" placeholder="What made it memorable?">${esc(e.notes)}</textarea>
      <label>Photos</label>
      <div class="photoadd" id="phList"></div>
      <div class="note">Photos are compressed and stored on this device only.</div>
      ${isNew?'':`<label>Danger zone</label>
        <button class="btn danger" id="delEntry" style="width:100%">Delete this memory</button>`}
    </div>
    <div class="sfoot">
      <button class="btn ghost" data-x>Cancel</button>
      <button class="btn primary" id="saveEntry">${isNew?'Save memory':'Save changes'}</button>
    </div>
  </div>`;

  const nameHints = {place:'e.g. City Palace', stay:'e.g. Hotel Lakend, Fateh Sagar', food:'e.g. Café at Ambrai Ghat', shop:'e.g. Bandhani dupattas, Hathi Pol', gift:'e.g. Miniature painting for Maa', fun:'e.g. Cultural show at Bagore ki Haveli', travel:'e.g. Airport → hotel taxi', people:'e.g. Ramesh ji, our boat guide', misc:'e.g. SIM recharge, tips, medicines'};
  const nameInput = ov.querySelector('#e_name');
  const syncCatUI = ()=>{
    ov.querySelectorAll('.catpick button').forEach(b=>b.classList.toggle('on', b.dataset.cat===e.cat));
    ov.querySelector('#travelExtra').classList.toggle('hidden', e.cat!=='travel');
    ov.querySelector('#stayExtra').classList.toggle('hidden', e.cat!=='stay');
    ov.querySelector('#peopleExtra').classList.toggle('hidden', e.cat!=='people');
    nameInput.placeholder = nameHints[e.cat];
    ov.querySelector('#l_name').textContent = CATS[e.cat].one + ' *';
    ov.querySelector('#l_date').textContent = e.cat==='stay' ? 'Check-in' : e.cat==='people' ? 'Met on' : 'Date';
  };
  syncCatUI();
  ov.querySelectorAll('.catpick button').forEach(b=>b.addEventListener('click', ()=>{ e.cat=b.dataset.cat; syncCatUI(); }));
  ov.querySelector('#scopeSeg').addEventListener('click', ev=>{
    const b = ev.target.closest('button'); if(!b) return;
    e.scope = b.dataset.s;
    ov.querySelectorAll('#scopeSeg button').forEach(x=>x.classList.toggle('on', x===b));
  });

  async function renderPhotos(){
    const box = ov.querySelector('#phList');
    let html = '';
    for(const pid of photos) html += `<div class="pthumb"><img src="${await photoURL(pid)}" alt=""><button class="x" data-rm="${pid}">✕</button></div>`;
    html += `<button class="addph" id="addPh"><span>＋</span>Add</button>`;
    box.innerHTML = html;
    box.querySelector('#addPh').addEventListener('click', pickPhotos);
    box.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click', ()=>{
      photos = photos.filter(p=>p!==b.dataset.rm); renderPhotos();
    }));
  }
  function pickPhotos(){
    const fi = document.getElementById('fileInput');
    fi.onchange = async ()=>{
      const files = [...fi.files]; fi.value = '';
      if(!files.length) return;
      toast(files.length>1 ? `Adding ${files.length} photos…` : 'Adding photo…');
      for(const f of files){
        try{
          const blob = await compressImage(f);
          const pid = uid();
          await put('photos', {id:pid, tripId:trip.id, blob, created:Date.now()});
          photos.push(pid); newPhotoIds.push(pid);
        }catch(err){ toast('Could not read one photo'); }
      }
      renderPhotos();
    };
    fi.click();
  }
  renderPhotos();

  ov.addEventListener('click', ev=>{ if(ev.target===ov || ev.target.closest('[data-x]')) closeModal(); });

  let saved = false;
  ov.querySelector('#saveEntry').addEventListener('click', async ()=>{
    const name = ov.querySelector('#e_name').value.trim();
    if(!name){ toast('Give it a name'); return; }
    Object.assign(e, { name,
      date: ov.querySelector('#e_date').value,
      amount: parseFloat(ov.querySelector('#e_amt').value)||0,
      notes: ov.querySelector('#e_notes').value.trim(),
      mode: e.cat==='travel' ? ov.querySelector('#e_mode').value : '',
      checkout: e.cat==='stay' ? ov.querySelector('#e_checkout').value : '',
      contact: e.cat==='people' ? ov.querySelector('#e_contact').value.trim() : '',
      photos });
    if(e.cat!=='travel') e.scope='';
    await put('entries', e);
    // set trip cover automatically if none
    const t = await get('trips', trip.id);
    if(t && !t.cover && photos.length){ t.cover = photos[0]; await put('trips', t); }
    saved = true;
    closeModal();
    toast(isNew?'Memory saved':'Changes saved');
    render();
  });

  const delBtn = ov.querySelector('#delEntry');
  if(delBtn) delBtn.addEventListener('click', async ()=>{
    const ok = await confirmBox('Delete this memory?', 'Its photos will also be removed from the album.', 'Delete');
    if(!ok) return;
    for(const pid of e.photos||[]){ await del('photos', pid); urlCache.delete(pid); }
    await del('entries', e.id);
    saved = true;
    closeModal();
    toast('Memory deleted');
    render();
  });

  openModal(ov, async ()=>{
    if(!saved && newPhotoIds.length){   // rollback photos added then cancelled
      for(const pid of newPhotoIds){ await del('photos', pid); urlCache.delete(pid); }
    }
  });
}

/* ============ PHOTO VIEWER ============ */
async function photoViewer(pid, trip){
  const u = await photoURL(pid);
  const v = document.createElement('div');
  v.className = 'viewer';
  v.innerHTML = `
    <button class="vclose" data-x>✕</button>
    <div class="vimg"><img src="${u}" alt=""></div>
    <div class="vbar">
      <button id="setCover">Set as trip cover</button>
      <button id="delPhoto" style="background:rgba(181,72,58,.85)">Delete photo</button>
    </div>`;
  v.addEventListener('click', e=>{ if(e.target.closest('[data-x]')) closeModal(); });
  v.querySelector('#setCover').addEventListener('click', async ()=>{
    const t = await get('trips', trip.id); t.cover = pid; await put('trips', t);
    closeModal(); toast('Cover updated'); render();
  });
  v.querySelector('#delPhoto').addEventListener('click', async ()=>{
    const ok = await confirmBox('Delete this photo?', 'It will be removed from the memory it belongs to.', 'Delete');
    if(!ok) return;
    const es = await byTrip('entries', trip.id);
    for(const e of es){ if(e.photos && e.photos.includes(pid)){ e.photos = e.photos.filter(p=>p!==pid); await put('entries', e); } }
    const t = await get('trips', trip.id);
    if(t.cover === pid){ t.cover = null; await put('trips', t); }
    await del('photos', pid); urlCache.delete(pid);
    closeModal(); toast('Photo deleted'); render();
  });
  openModal(v);
}

/* ============ BACKUP / RESTORE ============ */
const blobToB64 = b => new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(r.error); r.readAsDataURL(b); });
const b64ToBlob = (b64, type='image/jpeg') => {
  const bin = atob(b64); const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr], {type});
};

function backupSheet(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
  <div class="sheet">
    <div class="shead"><h2>Backup &amp; restore</h2>
      <button class="iconbtn" style="background:var(--teal-soft);color:var(--teal)" data-x>✕</button></div>
    <div class="sbody" style="padding-bottom:6px">
      <p class="note" style="margin-top:10px">Everything lives on this device. Export a backup file now and then — save it to Files / Drive — and restore it here on any phone.</p>
      <label>Export</label>
      <button class="btn primary" id="expFull" style="width:100%">Download backup (with photos)</button>
      <div style="height:9px"></div>
      <button class="btn ghost" id="expLite" style="width:100%">Download data only (small file)</button>
      <label>Restore</label>
      <button class="btn ghost" id="impBtn" style="width:100%">Import a backup file</button>
      <div class="note" style="margin-bottom:14px">Import adds trips from the file; trips with matching IDs are updated, nothing else is deleted.</div>
    </div>
  </div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov || e.target.closest('[data-x]')) closeModal(); });

  async function doExport(withPhotos){
    toast('Preparing backup…');
    const [trips, entries, photos] = await Promise.all([all('trips'), all('entries'), all('photos')]);
    const pack = { app:'safarnama', version:1, exported:new Date().toISOString(), trips, entries, photos:[] };
    if(withPhotos){
      for(const p of photos) pack.photos.push({id:p.id, tripId:p.tripId, created:p.created, b64:await blobToB64(p.blob)});
    }
    const blob = new Blob([JSON.stringify(pack)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `safarnama-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
    toast('Backup downloaded');
  }
  ov.querySelector('#expFull').addEventListener('click', ()=>doExport(true));
  ov.querySelector('#expLite').addEventListener('click', ()=>doExport(false));
  ov.querySelector('#impBtn').addEventListener('click', ()=>{
    const fi = document.getElementById('importInput');
    fi.onchange = async ()=>{
      const f = fi.files[0]; fi.value=''; if(!f) return;
      try{
        const pack = JSON.parse(await f.text());
        if(pack.app!=='safarnama') throw 0;
        for(const t of pack.trips||[]) await put('trips', t);
        for(const e of pack.entries||[]) await put('entries', e);
        for(const p of pack.photos||[]){
          if(p.b64) await put('photos', {id:p.id, tripId:p.tripId, created:p.created, blob:b64ToBlob(p.b64)});
        }
        urlCache.clear();
        closeModal(); toast('Backup restored'); render();
      }catch{ toast('That file is not a Safarnama backup'); }
    };
    fi.click();
  });
  openModal(ov);
}

/* ============ boot ============ */
(async function(){
  await openDB();
  if(navigator.storage && navigator.storage.persist) navigator.storage.persist();
  history.replaceState({nav:{name:'home'}}, '');
  render();
  if('serviceWorker' in navigator){
    try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
  }
})();
